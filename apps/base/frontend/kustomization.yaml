apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: tierdemo-script
    files:
      - tierdemo.py
generatorOptions:
  disableNameSuffixHash: true
resources:
  - namespace.yaml
  - externalsecret-tierdemo.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml
