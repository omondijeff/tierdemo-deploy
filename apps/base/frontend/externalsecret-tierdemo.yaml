# Credentials for the dummy web tier to reach Redis and Postgres (same Vault paths as data tiers).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: frontend-tierdemo-credentials
  namespace: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: frontend-tier-secrets
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/data/redis
        property: password
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/data/db
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/data/db
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: secret/data/db
        property: database
